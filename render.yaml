services:
  - type: web
    name: projectdesk-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://projectdesk1311.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
